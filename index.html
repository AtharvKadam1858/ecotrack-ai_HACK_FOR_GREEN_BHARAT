<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EcoTrack AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
    <h1>🌱 EcoTrack AI</h1>
    <p>Predict. Reduce. Transform.</p>
</header>

<div class="container">

    <div class="card">
        <h2>Daily Activity Input</h2>

        <label>Daily Travel (km by car):</label>
        <input type="number" id="travel" value="10">

        <label>Electricity Usage (kWh/day):</label>
        <input type="number" id="electricity" value="5">

        <label>Diet Type:</label>
        <select id="diet">
            <option value="2.5">Non-Vegetarian</option>
            <option value="1.7">Vegetarian</option>
            <option value="1.2">Vegan</option>
        </select>

        <button onclick="calculateCarbon()">Calculate</button>
    </div>

    <div class="card">
        <h2>Your Carbon Footprint</h2>
        <h3 id="result">0 kg CO₂ / day</h3>
        <h4 id="ecoscore">Eco Score: 0</h4>
    </div>

    <div class="card">
        <h2>Emission Forecast</h2>
        <canvas id="forecastChart"></canvas>
    </div>

    <div class="card">
        <h2>Smart Recommendations</h2>
        <ul id="recommendations"></ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
